services:
  postgres:
    image: postgis/postgis:17-3.5
    container_name: yapyap-db
    environment:
      POSTGRES_DB: yapyap
      POSTGRES_USER: yapyap
      POSTGRES_PASSWORD: yapyap_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yapyap -d yapyap"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
